<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceres CRM — Panel de Ejecutivos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .verde   { background: #16a34a22; border-left: 4px solid #16a34a; }
    .amarillo{ background: #ca8a0422; border-left: 4px solid #ca8a04; }
    .rojo    { background: #dc262622; border-left: 4px solid #dc2626; }
    .badge-verde    { background:#16a34a; }
    .badge-amarillo { background:#ca8a04; }
    .badge-rojo     { background:#dc2626; }
  </style>
</head>
<body class="min-h-screen text-white font-sans">

  <!-- Header -->
  <header class="bg-slate-900 border-b border-slate-700 px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-green-600 flex items-center justify-center font-bold text-lg">C</div>
      <div>
        <p class="font-bold text-lg leading-none">Grupo Ceres</p>
        <p class="text-slate-400 text-xs">Panel de Ejecutivos — CRM</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span id="tiie-badge" class="text-sm bg-slate-800 px-3 py-1 rounded-full text-slate-300">Cargando TIIE...</span>
      <span class="text-xs text-slate-500" id="ultima-actualizacion"></span>
      <button onclick="cargarLeads()" class="bg-green-700 hover:bg-green-600 text-white text-sm px-4 py-1.5 rounded-lg transition">↻ Actualizar</button>
    </div>
  </header>

  <main class="px-8 py-6 max-w-7xl mx-auto">

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4 mb-8">
      <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
        <p class="text-slate-400 text-sm">Total leads</p>
        <p class="text-3xl font-bold mt-1" id="stat-total">—</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-5 border border-green-900">
        <p class="text-green-400 text-sm">✅ Aprobados</p>
        <p class="text-3xl font-bold mt-1 text-green-400" id="stat-verde">—</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-5 border border-yellow-900">
        <p class="text-yellow-400 text-sm">⚠️ En revisión</p>
        <p class="text-3xl font-bold mt-1 text-yellow-400" id="stat-amarillo">—</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-5 border border-red-900">
        <p class="text-red-400 text-sm">❌ Rechazados</p>
        <p class="text-3xl font-bold mt-1 text-red-400" id="stat-rojo">—</p>
      </div>
    </div>

    <!-- Tabla -->
    <div class="bg-slate-900 rounded-xl border border-slate-700 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-700 flex items-center justify-between">
        <h2 class="font-semibold text-slate-200">Prospectos</h2>
        <input id="buscar" onkeyup="filtrar()" type="text" placeholder="Buscar por nombre, giro o municipio..."
          class="bg-slate-800 border border-slate-600 text-sm text-white rounded-lg px-3 py-1.5 w-72 outline-none focus:border-green-500" />
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-slate-400 text-xs uppercase bg-slate-800">
            <tr>
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">Nombre</th>
              <th class="px-4 py-3 text-left">Teléfono</th>
              <th class="px-4 py-3 text-left">Giro</th>
              <th class="px-4 py-3 text-left">Municipio</th>
              <th class="px-4 py-3 text-right">Monto</th>
              <th class="px-4 py-3 text-center">Plazo</th>
              <th class="px-4 py-3 text-right">Cuota/mes</th>
              <th class="px-4 py-3 text-center">Score</th>
              <th class="px-4 py-3 text-center">Decisión</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-center">Fecha</th>
            </tr>
          </thead>
          <tbody id="tabla-leads" class="divide-y divide-slate-800">
            <tr><td colspan="12" class="text-center py-12 text-slate-500">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API = 'https://ceresagente.dashclass.studio'
    let todosLosLeads = []

    async function cargarTIIE() {
      try {
        const r = await fetch(`${API}/tiie`)
        const d = await r.json()
        document.getElementById('tiie-badge').textContent =
          `TIIE ${d.tiie_28_dias}% · Tasa Ceres ${d.tasa_referencia}%`
      } catch {}
    }

    async function cargarLeads() {
      try {
        const r = await fetch(`${API}/leads`)
        todosLosLeads = await r.json()
        renderTabla(todosLosLeads)
        actualizarStats(todosLosLeads)
        document.getElementById('ultima-actualizacion').textContent =
          'Actualizado ' + new Date().toLocaleTimeString('es-MX')
      } catch (e) {
        document.getElementById('tabla-leads').innerHTML =
          `<tr><td colspan="12" class="text-center py-12 text-red-400">Error al cargar datos</td></tr>`
      }
    }

    function actualizarStats(leads) {
      document.getElementById('stat-total').textContent = leads.length
      document.getElementById('stat-verde').textContent = leads.filter(l => l.decision === 'verde').length
      document.getElementById('stat-amarillo').textContent = leads.filter(l => l.decision === 'amarillo').length
      document.getElementById('stat-rojo').textContent = leads.filter(l => l.decision === 'rojo').length
    }

    function renderTabla(leads) {
      const tbody = document.getElementById('tabla-leads')
      if (!leads.length) {
        tbody.innerHTML = `<tr><td colspan="12" class="text-center py-12 text-slate-500">Sin prospectos aún</td></tr>`
        return
      }

      tbody.innerHTML = leads.map(l => {
        const dec = l.decision || 'rojo'
        const badgeColor = { verde: 'badge-verde', amarillo: 'badge-amarillo', rojo: 'badge-rojo' }[dec]
        const rowClass = dec
        const score = l.score ? Math.round(l.score * 100) : '—'
        const monto = l.monto_solicitado ? `$${Number(l.monto_solicitado).toLocaleString('es-MX')}` : '—'
        const cuota = l.cuota_mensual ? `$${Number(l.cuota_mensual).toLocaleString('es-MX', {minimumFractionDigits:2})}` : '—'
        const fecha = l.creado_en ? new Date(l.creado_en).toLocaleDateString('es-MX') : '—'
        const statusOpts = ['nuevo','pendiente_docs','en_proceso','aprobado','rechazado']
          .map(s => `<option value="${s}" ${l.status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('')

        return `
          <tr class="${rowClass} hover:opacity-90 transition">
            <td class="px-4 py-3 text-slate-400">#${l.id}</td>
            <td class="px-4 py-3 font-medium">${l.nombre || '—'}</td>
            <td class="px-4 py-3 text-slate-400">${l.telefono || '—'}</td>
            <td class="px-4 py-3 capitalize">${l.giro || '—'}</td>
            <td class="px-4 py-3">${l.municipio || '—'}, ${l.estado || ''}</td>
            <td class="px-4 py-3 text-right font-mono">${monto}</td>
            <td class="px-4 py-3 text-center">${l.plazo_meses || '—'} meses</td>
            <td class="px-4 py-3 text-right font-mono">${cuota}</td>
            <td class="px-4 py-3 text-center">
              <span class="font-bold ${dec==='verde'?'text-green-400':dec==='amarillo'?'text-yellow-400':'text-red-400'}">${score}%</span>
            </td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-0.5 rounded-full text-xs font-bold ${badgeColor}">${dec.toUpperCase()}</span>
            </td>
            <td class="px-4 py-3 text-center">
              <select onchange="actualizarStatus(${l.id}, this.value)"
                class="bg-slate-700 text-xs rounded px-2 py-1 border border-slate-600 outline-none">
                ${statusOpts}
              </select>
            </td>
            <td class="px-4 py-3 text-center text-slate-400 text-xs">${fecha}</td>
          </tr>`
      }).join('')
    }

    function filtrar() {
      const q = document.getElementById('buscar').value.toLowerCase()
      const filtrados = todosLosLeads.filter(l =>
        (l.nombre||'').toLowerCase().includes(q) ||
        (l.giro||'').toLowerCase().includes(q) ||
        (l.municipio||'').toLowerCase().includes(q)
      )
      renderTabla(filtrados)
    }

    async function actualizarStatus(id, status) {
      await fetch(`${API}/leads/${id}/status?status=${status}`, { method: 'PATCH' })
    }

    // Iniciar
    cargarTIIE()
    cargarLeads()
    setInterval(cargarLeads, 30000) // auto-refresh cada 30 seg
  </script>
</body>
</html>
